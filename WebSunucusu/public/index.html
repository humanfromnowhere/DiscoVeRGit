<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscoVeR - User Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans">

    <header class="bg-gradient-to-r from-slate-800 via-purple-900 to-slate-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-md cursor-pointer hover:bg-slate-100 transition" onclick="mekanAra()">
                    <i data-lucide="search" class="text-purple-900 w-6 h-6"></i>
                </div>
                
                <input type="text" id="searchInput" placeholder="Otel, okul veya mekan ara..." onkeypress="if(event.key === 'Enter') mekanAra()" class="px-4 py-2 rounded-lg text-slate-800 border-2 border-purple-300 focus:outline-none focus:border-amber-400 w-64 placeholder-slate-400 shadow-inner">
                
                <div class="ml-4">
                    <h1 class="text-xl font-bold leading-tight">
                        <span class="text-amber-400">Disco</span><span class="text-slate-200">VeR</span>
                    </h1>
                    <p class="text-xs text-slate-300 opacity-80">User Dashboard</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-semibold">user@discover.com</p>
                    <p class="text-xs text-slate-300">İşletme Sahibi</p>
                </div>
                <button id="btn-logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg flex items-center gap-2 transition-all shadow-md text-sm font-medium">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Çıkış
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="bg-white rounded-xl shadow-sm p-2 mb-8 flex gap-2 overflow-x-auto">
            <button id="tab-dashboard" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-purple-600 text-white">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </button>
            <button id="tab-models" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all text-slate-600 hover:bg-slate-100">
                <i data-lucide="box" class="w-5 h-5"></i> 3D Modeller
            </button>
        </div>

        <div id="page-dashboard" class="space-y-6 animate-fade-in">
            <h2 class="text-3xl font-bold text-slate-800">Hoşgeldiniz!</h2>
            
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="upload-cloud" class="w-5 h-5 text-purple-600"></i> Yeni Model Yükle
                </h3>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2 text-slate-700">Mekan Adı (Açıklama)</label>
                    <input type="text" id="mekanAdiInput" placeholder="Ziyaretçilerin arayacağı ismi girin..." class="border border-slate-300 p-2 rounded-lg w-full focus:outline-none focus:border-purple-500">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2 text-slate-700">3D Model Seç (.glb, .gltf, .obj, .fbx)</label>
                    <input type="file" id="modelDosyasi" accept=".glb,.gltf,.obj,.fbx" class="border border-slate-300 p-2 rounded-lg w-full text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100">
                    <p class="text-xs text-slate-500 mt-1">* Maksimum dosya boyutu: 50MB</p>
                </div>

                <button onclick="modeliSupabaseYukle()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition-all shadow-md">
                    Modeli Yükle
                </button>

                <div id="yuklemeDurumu" class="mt-4 text-sm font-bold"></div>
            </div>
            
            <div id="aramaSonucuAlan" class="hidden bg-green-50 rounded-xl shadow-md p-6 border border-green-200">
                <h3 class="text-xl font-bold text-green-800 mb-2">Mekan Bulundu! 🎉</h3>
                <div id="bulunanMekanDetay" class="text-green-700 font-medium"></div>
                <p class="text-sm text-green-600 mt-2">(Bir sonraki adımda bu URL'yi alıp Unity'de açacağız)</p>
            </div>
        </div>

        <div id="page-models" class="hidden space-y-6 animate-fade-in">
            <div class="flex items-center justify-between">
                <h2 class="text-3xl font-bold text-slate-800">Model Listesi</h2>
                <button onclick="modelleriGetir()" class="text-purple-600 flex items-center gap-1 text-sm font-semibold">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Yenile
                </button>
            </div>
            <div id="modelListesiGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-center text-slate-500 py-8 col-span-full">Modeller yükleniyor...</p>
            </div>
        </div>

    </div>

    <script>
        // 1. SUPABASE BAĞLANTISI
        const { createClient } = supabase;
        const supabaseUrl = 'https://pwvbclqgfngimozemcqn.supabase.co'; 
        const supabaseKey = 'sb_publishable_-Vrcty6N0qeOC6IafJ4qvQ_QLLHK13L';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        // BUCKET İSMİ (Büyük harf hatası düzeltildi)
        const BUCKET_NAME = '3D-Models'; 

        // 2. MODEL YÜKLEME FONKSİYONU (GÜNCELLENMİŞ - CONVERSION EKLENDİ)
        async function modeliSupabaseYukle() {
            const mekanAdiInput = document.getElementById('mekanAdiInput');
            const fileInput = document.getElementById('modelDosyasi');
            const durumMetni = document.getElementById('yuklemeDurumu');

            const mekanAdi = mekanAdiInput.value.trim();

            if (!mekanAdi) {
                durumMetni.innerHTML = " Lütfen bir mekan adı girin!";
                durumMetni.className = "mt-4 text-sm font-bold text-red-600";
                return;
            }

            if (fileInput.files.length === 0) {
                durumMetni.innerHTML = "â Lütfen yüklenecek modeli seçin!";
                durumMetni.className = "mt-4 text-sm font-bold text-red-600";
                return;
            }

            const file = fileInput.files[0];
            const maxMB = 50; 
            const fileSizeMB = file.size / (1024 * 1024);
            
            if (fileSizeMB > maxMB) {
                durumMetni.innerHTML = `â Dosya çok büyük! (${fileSizeMB.toFixed(2)}MB)`;
                durumMetni.className = "mt-4 text-sm font-bold text-red-600";
                return;
            }

            durumMetni.innerHTML = "â³ İşleniyor...";
            durumMetni.className = "mt-4 text-sm font-bold text-blue-600";

            try {
                let finalFile = file;
                let originalFormat = file.name.split('.').pop().toLowerCase();

                // Check if conversion is needed
                if (!['.glb', '.gltf'].includes('.' + originalFormat)) {
                    durumMetni.innerHTML = "ðŸ”ƒ Model dönüştürülüyor...";
                    
                    // Send file to server for conversion
                    const formData = new FormData();
                    formData.append('model', file);
                    formData.append('originalName', file.name);
                    formData.append('outputFormat', 'glb'); // Default to GLB for better compression

                    const conversionResponse = await fetch('/convert-model', {
                        method: 'POST',
                        body: formData
                    });

                    if (!conversionResponse.ok) {
                        const errorData = await conversionResponse.json();
                        throw new Error(`Conversion failed: ${errorData.error}`);
                    }

                    const conversionResult = await conversionResponse.json();
                    
                    // Create new file from converted data
                    const response = await fetch(conversionResult.url);
                    const blob = await response.blob();
                    finalFile = new File([blob], conversionResult.filename, { type: 'model/gltf-binary' });
                    
                    durumMetni.innerHTML = "â… Dönüştürme tamamlandı, yüklüyor...";
                }

                // A. STORAGE YÜKLEME
                const dosyaUzantisi = finalFile.name.split('.').pop();
                const benzersizDosyaAdi = `${Date.now()}-${Math.random().toString(36).substring(2)}.${dosyaUzantisi}`;

                const { data: storageData, error: storageError } = await supabaseClient
                    .storage
                    .from(BUCKET_NAME)
                    .upload(benzersizDosyaAdi, finalFile);

                if (storageError) throw storageError;

                // B. URL ALMA
                const { data: urlData } = await supabaseClient
                    .storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(benzersizDosyaAdi);
                
                const modelPublicUrl = urlData.publicUrl;

                // C. DATABASE KAYIT
                const { data: dbData, error: dbError } = await supabaseClient
                    .from('uploaded_models')
                    .insert([
                        { 
                            description: mekanAdi,
                            model_name: file.name, // Original filename
                            model_url: modelPublicUrl, 
                            uploader_name: "Aktif Kullanici",
                            original_format: originalFormat,
                            converted_format: dosyaUzantisi,
                            file_size: finalFile.size
                        }
                    ]);

                if (dbError) throw dbError;

                durumMetni.innerHTML = "â… Model başarıyla kaydedildi!";
                durumMetni.className = "mt-4 text-sm font-bold text-green-600";
                
                mekanAdiInput.value = "";
                fileInput.value = "";
                modelleriGetir(); // Listeyi güncelle

            } catch (hata) {
                console.error("Hata detay:", hata);
                durumMetni.innerHTML = "â Hata: " + hata.message;
                durumMetni.className = "mt-4 text-sm font-bold text-red-600";
            }
        }

        // 3. MODELLERİ LİSTELEME FONKSİYONU
        async function modelleriGetir() {
            const listeAlan = document.getElementById('modelListesiGrid');
            
            const { data, error } = await supabaseClient
                .from('uploaded_models')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return;

            if (data.length === 0) {
                listeAlan.innerHTML = `<p class="col-span-full text-center text-slate-500 py-8">Henüz model bulunamadı.</p>`;
                return;
            }

            listeAlan.innerHTML = data.map(model => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
                    <div class="w-full h-32 bg-slate-100 rounded-lg mb-3 flex items-center justify-center">
                        <i data-lucide="box" class="w-12 h-12 text-slate-300"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 truncate">${model.description || 'İsimsiz Mekan'}</h4>
                    <p class="text-xs text-slate-500 mb-3 truncate">${model.model_name}</p>
                    <a href="${model.model_url}" target="_blank" class="block text-center bg-slate-800 text-white py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition">URL Kopyala</a>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // 4. ARAMA FONKSİYONU (place_name yerine description)
        async function mekanAra() {
            const aramaMetni = document.getElementById('searchInput').value.trim();
            const sonucAlan = document.getElementById('aramaSonucuAlan');
            const sonucDetay = document.getElementById('bulunanMekanDetay');

            if (!aramaMetni) return;

            const { data, error } = await supabaseClient
                .from('uploaded_models')
                .select('*')
                .ilike('description', `%${aramaMetni}%`); 

            if (data && data.length > 0) {
                const m = data[0];
                sonucAlan.classList.remove('hidden');
                sonucDetay.innerHTML = `Mekan: <b>${m.description}</b> <br> Model: <span class="text-xs">${m.model_name}</span>`;
            } else {
                sonucAlan.classList.add('hidden');
                alert("Mekan bulunamadı.");
            }
        }

        // TAB KONTROLLERİ
        document.addEventListener('DOMContentLoaded', () => {
            const tabDashboard = document.getElementById('tab-dashboard');
            const tabModels = document.getElementById('tab-models');
            const pageDashboard = document.getElementById('page-dashboard');
            const pageModels = document.getElementById('page-models');

            tabDashboard.onclick = () => {
                pageDashboard.classList.remove('hidden');
                pageModels.classList.add('hidden');
                tabDashboard.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-purple-600 text-white";
                tabModels.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all text-slate-600 hover:bg-slate-100";
            };

            tabModels.onclick = () => {
                pageModels.classList.remove('hidden');
                pageDashboard.classList.add('hidden');
                tabModels.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-purple-600 text-white";
                tabDashboard.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all text-slate-600 hover:bg-slate-100";
                modelleriGetir();
            };

            lucide.createIcons();
        });
    </script>
</body>
</html>
