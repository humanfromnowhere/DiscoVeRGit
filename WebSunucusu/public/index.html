<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscoVeR - User Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans">

    <header class="bg-gradient-to-r from-slate-800 via-purple-900 to-slate-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-md">
                    <i data-lucide="search" class="text-purple-900 w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-tight">
                        <span class="text-amber-400">Disco</span><span class="text-slate-200">VeR</span>
                    </h1>
                    <p class="text-xs text-slate-300 opacity-80">User Dashboard</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-semibold">user@discover.com</p>
                    <p class="text-xs text-slate-300">Misafir Kullanıcı</p>
                </div>
                <button id="btn-logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg flex items-center gap-2 transition-all shadow-md text-sm font-medium">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Çıkış
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="bg-white rounded-xl shadow-sm p-2 mb-8 flex gap-2 overflow-x-auto">
            <button id="tab-dashboard" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-purple-600 text-white">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </button>
            <button id="tab-models" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all text-slate-600 hover:bg-slate-100">
                <i data-lucide="box" class="w-5 h-5"></i> 3D Modeller
            </button>
        </div>

        <div id="page-dashboard" class="space-y-6 animate-fade-in">
            <h2 class="text-3xl font-bold text-slate-800">Hoşgeldiniz!</h2>
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="activity" class="w-5 h-5 text-slate-400"></i> Son Aktiviteler
                </h3>
                <div class="space-y-3">
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg">
                        <p class="font-semibold text-slate-800">Bambu Evi İncelendi</p>
                        <span class="text-xs text-slate-500">Az önce</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-models" class="hidden space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-3xl font-bold text-slate-800">Model Listesi</h2>
                <p class="text-slate-500">İncelemek için bir model seçin</p>
            </div>

            <div class="grid gap-4">
                <div class="bg-white rounded-xl shadow-md p-6 border border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800">🏡 Lüks Villa</h3>
                        <span class="text-xs font-bold bg-green-100 text-green-800 px-2 py-1 rounded">Hazır</span>
                    </div>
                    <button data-model="villa.obj" class="btn-view-model bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-lg flex items-center gap-2 font-semibold shadow-md">
                        <i data-lucide="eye" class="w-5 h-5"></i> İncele
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-md p-6 border border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800">🎋 Bambu Kulübe</h3>
                        <span class="text-xs font-bold bg-green-100 text-green-800 px-2 py-1 rounded">Hazır</span>
                    </div>
                    <button data-model="bambu.obj" class="btn-view-model bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-lg flex items-center gap-2 font-semibold shadow-md">
                        <i data-lucide="eye" class="w-5 h-5"></i> İncele
                    </button>
                </div>
                 <div class="bg-white rounded-xl shadow-md p-6 border border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800">🏙️ Şehir Meydanı</h3>
                        <span class="text-xs font-bold bg-green-100 text-green-800 px-2 py-1 rounded">Hazır</span>
                    </div>
                    <button data-model="sokak.obj" class="btn-view-model bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-lg flex items-center gap-2 font-semibold shadow-md">
                        <i data-lucide="eye" class="w-5 h-5"></i> İncele
                    </button>
                </div>
            </div>

            <div id="unity-wrapper" class="hidden mt-8 bg-black rounded-xl overflow-hidden shadow-2xl border-4 border-slate-800 relative">
                <button id="btn-close-unity" class="absolute top-4 right-4 z-10 bg-red-600 text-white p-2 rounded-full hover:bg-red-700">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <canvas id="unity-canvas" class="w-full h-[600px] block"></canvas>
            </div>
        </div>

    </div>

    <script src="js/objOkuyucu.js"></script>
    <script src="js/indexStart.js"></script> </body>
</html>
