<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscoVeR - Admin Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans">

    <header class="bg-gradient-to-r from-slate-900 via-slate-800 to-amber-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-md">
                    <i data-lucide="shield" class="text-amber-700 w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">ADMIN PANELİ</h1>
                    <p class="text-xs text-amber-400">Tam Yetkili Erişim</p>
                </div>
            </div>
            <button id="btn-logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
                <i data-lucide="log-out" class="w-4 h-4"></i> Çıkış
            </button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="bg-white rounded-xl shadow-sm p-2 mb-8 flex gap-2 overflow-x-auto">
            <button id="tab-dashboard" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-amber-600 text-white">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Genel
            </button>
            <button id="tab-upload" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all text-slate-600 hover:bg-slate-100">
                <i data-lucide="upload-cloud" class="w-5 h-5"></i> Model Yükle
            </button>
            <button id="tab-models" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all text-slate-600 hover:bg-slate-100">
                <i data-lucide="box" class="w-5 h-5"></i> 3D Modeller
            </button>
        </div>

        <div id="page-dashboard" class="space-y-6">
            <h2 class="text-3xl font-bold text-slate-800">Sistem Durumu</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gradient-to-br from-amber-500 to-amber-700 rounded-xl p-6 text-white shadow-lg">
                    <p class="text-amber-100">Toplam Model</p>
                    <p class="text-4xl font-bold">4</p>
                </div>
                <div class="bg-gradient-to-br from-blue-500 to-blue-700 rounded-xl p-6 text-white shadow-lg">
                    <p class="text-blue-100">Aktif Kullanıcı</p>
                    <p class="text-4xl font-bold">12</p>
                </div>
            </div>
        </div>

        <div id="page-upload" class="hidden space-y-6">
            <h2 class="text-3xl font-bold text-slate-800">Yeni Model Ekle</h2>
            <div class="bg-white rounded-xl shadow-md p-12 border-4 border-dashed border-slate-300 text-center hover:border-amber-500 transition-colors cursor-pointer">
                <i data-lucide="upload-cloud" class="w-16 h-16 text-slate-400 mx-auto mb-4"></i>
                <h3 class="text-xl font-bold text-slate-700">Dosyayı Buraya Sürükleyin</h3>
                <p class="text-slate-500 mb-6">FBX veya OBJ formatı</p>
                <button class="bg-amber-600 text-white px-8 py-3 rounded-lg font-bold">Dosya Seç</button>
            </div>
        </div>

        <div id="page-models" class="hidden space-y-6">
            <h2 class="text-3xl font-bold text-slate-800">Model Önizleme</h2>
            <div class="grid gap-4">
                <div class="bg-white rounded-xl shadow-md p-6 flex justify-between items-center">
                    <h3 class="font-bold">🎋 Bambu Kulübe</h3>
                    <div class="flex gap-2">
                        <button class="bg-red-100 text-red-600 px-3 py-2 rounded hover:bg-red-200">Sil</button>
                        <button data-model="bambu.obj" class="btn-view-model bg-amber-500 text-white px-4 py-2 rounded font-bold">İncele</button>
                    </div>
                </div>
            </div>
            
            <div id="unity-wrapper" class="hidden mt-8 bg-black rounded-xl overflow-hidden shadow-2xl relative border-4 border-amber-800">
                <button id="btn-close-unity" class="absolute top-4 right-4 z-10 bg-red-600 text-white p-2 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <canvas id="unity-canvas" class="w-full h-[600px] block"></canvas>
            </div>
        </div>

    </div>

    <script src="js/objOkuyucu.js"></script>
    <script src="js/adminStart.js"></script> </body>
</html>
